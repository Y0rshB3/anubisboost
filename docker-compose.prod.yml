# =============================================================================
# AnubisBoost - Production Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Prerequisites:
#   - .env.production with real secrets
#   - DNS A record pointing to server IP
#   - Ports 80 and 443 open

name: anubisboost-prod

services:
  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy + SSL termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: ab-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - frontend_static:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - anubisboost

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ab-api
    restart: always
    env_file: .env.production
    environment:
      NODE_ENV: production
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - anubisboost

  # ---------------------------------------------------------------------------
  # Frontend — build only, output to shared volume
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    container_name: ab-frontend-build
    # This container exits after copying static files to the volume.
    # Nginx serves them directly.
    entrypoint: ["/bin/sh", "-c", "cp -r /usr/share/nginx/html/* /output/ && echo 'Static files copied.' && exit 0"]
    volumes:
      - frontend_static:/output
    networks: []

  # ---------------------------------------------------------------------------
  # MySQL 8
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0.36
    container_name: ab-mysql
    restart: always
    env_file: .env.production
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-anubisboost}
      MYSQL_USER: ${MYSQL_USER:-anubisboost}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql-prod.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - anubisboost

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: ab-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - anubisboost

  # ---------------------------------------------------------------------------
  # Certbot — SSL certificate renewal
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:v2.8.0
    container_name: ab-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renew every 12 hours (certbot is idempotent; only renews if needed)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 43200 & wait $${!}; done'"
    depends_on:
      - nginx
    networks: []

volumes:
  mysql_data:
  redis_data:
  frontend_static:
  certbot_webroot:
  certbot_certs:

networks:
  anubisboost:
    driver: bridge
